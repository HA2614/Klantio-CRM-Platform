<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer CRM - Login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 mt-3 fw-bold">Freelancer CRM</h1>
                            <p class="text-muted">Beheer je klanten en projecten</p>
                        </div>

                        <!-- Login Form -->
                        <div id="loginSection">
                            <button id="loginBtn" class="btn btn-primary btn-lg w-100 mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Inloggen
                            </button>

                            <div class="text-center">
                                <a href="#" id="showResetPassword" class="text-decoration-none small">
                                    Wachtwoord vergeten?
                                </a>
                            </div>

                            <hr class="my-4">

                            <button id="signupBtn" class="btn btn-outline-primary w-100" disabled>
                                <i class="bi bi-person-plus me-2"></i>
                                Account aanmaken
                            </button>
                        </div>

                        <!-- Password Reset Form -->
                        <div id="resetPasswordSection" class="d-none">
                            <h5 class="mb-3">Wachtwoord resetten</h5>
                            <form id="resetPasswordForm">
                                <div class="mb-3">
                                    <label for="resetEmail" class="form-label">Email adres</label>
                                    <input type="email" class="form-control" id="resetEmail" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-envelope me-2"></i>
                                    Verstuur reset link
                                </button>
                                <button type="button" id="backToLogin" class="btn btn-link w-100 mt-2">
                                    Terug naar login
                                </button>
                            </form>
                            <div id="resetMessage" class="alert mt-3 d-none"></div>
                        </div>

                        <!-- Loading Spinner -->
                        <div id="loadingSection" class="d-none text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Laden...</span>
                            </div>
                            <p class="mt-3 text-muted">Bezig met inloggen...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auth0 SPA SDK -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>

    <!-- Custom JS -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Initialize auth when page loads
        let auth0Client = null;

        window.addEventListener('load', async () => {
            auth0Client = await initAuth0();

            // Check if returning from Auth0
            if (window.location.search.includes("code=") || window.location.search.includes("error=")) {
                await handleRedirectCallback();
            }

            // Check if already logged in
            const isAuthenticated = await auth0Client.isAuthenticated();
            if (isAuthenticated) {
                window.location.href = 'dashboard.html';
            }
        });

        // Login button
        document.getElementById("loginBtn").addEventListener("click", async () => {
            await auth0Client.loginWithRedirect({
                authorizationParams: {
                    redirect_uri: window.location.origin + "/dashboard.html",
                    audience: AUTH0_CONFIG.audience,
                    scope: "openid profile email read:dashboard",
                    prompt: "consent"
                }
            });
        });

        // Signup button
        document.getElementById('signupBtn').addEventListener('click', async () => {
            try {
                console.log("AUTH0 CONFIG", AUTH0_CONFIG);
                await auth0Client.loginWithRedirect({
                    authorizationParams: {
                        redirect_uri: window.location.origin + "/dashboard.html",
                        audience: AUTH0_CONFIG.audience,
                        scope: "openid profile email offline_access"
                    }
                });

            } catch (error) {
                console.error('Signup error:', error);
                alert('Er ging iets mis bij het aanmaken van je account. Probeer het opnieuw.');
            }
        });

        // Show password reset form
        document.getElementById('showResetPassword').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginSection').classList.add('d-none');
            document.getElementById('resetPasswordSection').classList.remove('d-none');
        });

        // Back to login
        document.getElementById('backToLogin').addEventListener('click', () => {
            document.getElementById('resetPasswordSection').classList.add('d-none');
            document.getElementById('loginSection').classList.remove('d-none');
            document.getElementById('resetMessage').classList.add('d-none');
        });

        // Password reset form
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const messageDiv = document.getElementById('resetMessage');

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/password-reset`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'alert alert-success mt-3';
                    messageDiv.textContent = 'Reset link verstuurd! Check je email.';
                    messageDiv.classList.remove('d-none');
                    document.getElementById('resetPasswordForm').reset();
                } else {
                    throw new Error(data.error || 'Er ging iets mis');
                }
            } catch (error) {
                messageDiv.className = 'alert alert-danger mt-3';
                messageDiv.textContent = 'Er ging iets mis. Probeer het opnieuw.';
                messageDiv.classList.remove('d-none');
            }
        });

        async function handleRedirectCallback() {
            const loadingSection = document.getElementById('loadingSection');
            const loginSection = document.getElementById('loginSection');

            loadingSection.classList.remove('d-none');
            loginSection.classList.add('d-none');

            try {
                await auth0Client.handleRedirectCallback();
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Redirect callback error:', error);
                loadingSection.classList.add('d-none');
                loginSection.classList.remove('d-none');
                alert('Er ging iets mis bij het inloggen. Probeer het opnieuw.');
            }
        }
    </script>
</body>

</html>
