<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profiel - Freelancer CRM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-people-fill me-2"></i>
                Freelancer CRM
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-house-door me-1"></i>
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html">
                            <i class="bi bi-person me-1"></i>
                            Profiel
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center">
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle" type="button" id="userDropdown"
                            data-bs-toggle="dropdown">
                            <img id="userAvatar" src="" alt="User" class="rounded-circle me-2" width="32" height="32"
                                style="display:none;">
                            <span id="userName">Laden...</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="profile.html"><i
                                        class="bi bi-person me-2"></i>Profiel</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Instellingen</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i
                                        class="bi bi-box-arrow-right me-2"></i>Uitloggen</a></li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Account</h5>
                    </div>
                    <div class="card-body text-center">
                        <img id="profileAvatar" src="" alt="Profile" class="rounded-circle mb-3" width="120"
                            height="120" style="display:none;">


                        <h5 id="profileName" class="mb-1">Laden...</h5>
                        <p class="text-muted mb-2" id="profileEmail">-</p>

                        <div class="small text-muted mb-3">
                            User ID: <span id="profileUserId">-</span>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-secondary" id="changePasswordBtn">
                                Wachtwoord wijzigen
                            </button>
                            <button class="btn btn-outline-primary" id="reloadBtn">
                                Opnieuw laden
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h5 class="mb-0">Contactgegevens</h5>
                        <button class="btn btn-sm btn-primary" id="saveBtn">
                            Opslaan
                        </button>
                    </div>
                    <div class="card-body">


                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Voornaam</label>
                                <input class="form-control" id="firstName" placeholder="Bijv. Don">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Achternaam</label>
                                <input class="form-control" id="lastName" placeholder="Bijv. van der Helm">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Telefoon</label>
                                <input class="form-control" id="phone" placeholder="+31 ...">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Bedrijfsnaam</label>
                                <input class="form-control" id="company" placeholder="Bedrijf">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Adres</label>
                                <input class="form-control" id="address" placeholder="Straat + nr, stad">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Over mij</label>
                                <textarea class="form-control" id="bio" rows="4"
                                    placeholder="Korte beschrijving..."></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" id="saveBtn2">Opslaan</button>
                            <button class="btn btn-outline-secondary" id="cancelBtn">Annuleren</button>
                        </div>

                        <div class="small text-muted mt-3" id="statusText" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
